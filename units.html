<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Units - Cybernetic Strategy Galaxy Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="universe.css" />
  <style>

    /* -- PAGE SHELL ------------------------------- */
    .units-page {
      padding: 10rem 0 8rem;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* -- FILTERS ---------------------------------- */
    .filters-bar {
      display: flex; flex-wrap: wrap; gap: 2rem; align-items: flex-end;
      padding: 2.5rem 3rem;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      margin-bottom: 3rem;
    }
    .filters-bar__group { display: flex; flex-direction: column; gap: 0.8rem; }
    .filters-bar__label {
      font-family: var(--font-mono); font-size: 0.9rem;
      letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-dim);
    }
    .filters-bar__btns { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .filter-btn {
      font-family: var(--font-mono); font-size: 1rem; letter-spacing: 0.1em;
      padding: 0.6rem 1.4rem; background: transparent;
      border: 1px solid var(--border-dim); color: var(--text-dim);
      border-radius: 3px; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .search-row { margin-left: auto; display: flex; align-items: flex-end; }
    .page-search {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-dim);
      color: var(--text-bright); font-family: var(--font-body); font-size: 1.6rem;
      padding: 0.8rem 1.6rem; border-radius: 4px; width: 260px; outline: none;
      transition: border-color 0.2s;
    }
    .page-search:focus { border-color: var(--gold); }
    .page-search::placeholder { color: var(--text-dim); }

    .units-count {
      font-family: var(--font-mono); font-size: 1.2rem; color: var(--text-dim);
      letter-spacing: 0.12em; margin-bottom: 3rem;
    }
    .units-count span { color: var(--gold); }

    /* -- UNIT GRID -------------------------------- */
    .all-units-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 2rem;
    }

    /* -- UNIT CARD -------------------------------- */
    .ucf {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .ucf:hover {
      transform: translateY(-5px);
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55);
    }

    /* Card portrait - 3:4 ratio, uses [Name]Card.png */
    .ucf__portrait {
      width: 100%;
      aspect-ratio: 3 / 4;
      position: relative;
      overflow: hidden;
      background: var(--bg-panel);
    }
    .ucf__portrait img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      padding: 1.2rem 1.2rem 0.6rem;
      transition: transform 0.2s ease;
    }
    .ucf:hover .ucf__portrait img { filter: brightness(1.08); transform: scale(1.02); }

    /* Fallback colour bg when image missing */
    .ucf__portrait-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 7rem;
    }
    .ucf__portrait-img { position: relative; z-index: 1; }

    /* Cost badge top-right */
    .ucf__cost-badge { display: none; }

    /* Bottom gradient fade */
    .ucf__portrait-shade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
      background: linear-gradient(0deg, rgba(6,8,16,1) 0%, rgba(6,8,16,0.6) 50%, transparent 100%);
      z-index: 2;
    }

    /* Unit info sits over the bottom of the portrait */
    .ucf__info {
      padding: 1.4rem 1.6rem 1.6rem;
      background: var(--bg-panel);
      border-top: 1px solid var(--border-dim);
      flex: 1;
    }

    /* Name + editable subtitle */
    .ucf__name-row {
      display: flex; align-items: center;
      margin-bottom: 0.45rem;
    }
    .ucf__name {
      font-family: var(--font-display);
      font-size: 1.4rem; letter-spacing: 0.06em;
      color: var(--text-bright); text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .ucf__subtitle {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ucf__no-results {
      grid-column: 1/-1; text-align: center; padding: 8rem 0;
      font-family: var(--font-display); font-size: 2.2rem;
      color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* -- UNIT BIO PANEL (full-page slide-in) ---- */
    .bio-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(680px, 100vw);
      z-index: 300;
      background: var(--bg-dark);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .bio-panel.open { transform: translateX(0); }

    .bio-panel__backdrop {
      position: fixed; inset: 0; z-index: 299;
      background: rgba(6,8,16,0.7);
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.38s;
    }
    .bio-panel__backdrop.open { opacity: 1; pointer-events: all; }

    /* Portrait strip at the top */
    .bio-panel__portrait {
      width: 100%;
      height: 420px;
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg-panel);
    }
    .bio-panel__portrait img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .bio-panel__portrait-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12rem;
    }
    .bio-panel__portrait-shade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
      background: linear-gradient(0deg, var(--bg-dark) 0%, transparent 100%);
    }

    /* Close button */
    .bio-panel__close {
      position: absolute; top: 1.5rem; right: 1.5rem; z-index: 10;
      width: 40px; height: 40px; border-radius: 4px;
      background: rgba(6,8,16,0.8); border: 1px solid var(--border-dim);
      color: var(--text-mid); font-size: 1.8rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .bio-panel__close:hover { border-color: var(--gold); color: var(--gold); }

    /* Header overlaid on bottom of portrait */
    .bio-panel__header {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 2rem 3rem;
      z-index: 5;
    }
    .bio-panel__cost-row {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 0.8rem;
    }
    .bio-panel__cost-gems { display: flex; gap: 5px; }
    .bio-panel__cost-gem {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .bio-panel__role {
      font-family: var(--font-mono); font-size: 1rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
    }
    .bio-panel__name {
      font-family: var(--font-display);
      font-size: clamp(3rem, 5vw, 4.5rem);
      font-weight: 400; color: var(--text-bright);
      letter-spacing: 0.08em; text-transform: uppercase;
      line-height: 1; margin-bottom: 1.2rem;
    }
    /* Trait icons + names in header */
    .bio-panel__trait-row {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .bio-panel__trait-tag {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.4rem 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      background: rgba(6,8,16,0.6);
    }
    .bio-panel__trait-tag img {
      width: 18px; height: 18px; border-radius: 2px; object-fit: cover;
    }
    .bio-panel__trait-tag-mark { font-size: 1.4rem; line-height: 1; }
    .bio-panel__trait-tag-name {
      font-family: var(--font-mono); font-size: 1rem;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* Scrollable body */
    .bio-panel__body {
      flex: 1; overflow-y: auto; padding: 3rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .bio-panel__body::-webkit-scrollbar { width: 4px; }
    .bio-panel__body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .bio-panel__section-label {
      font-family: var(--font-mono); font-size: 1rem;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .bio-panel__section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border-dim);
    }

    /* Lore / bio text */
    .bio-panel__lore {
      font-size: 2rem;
      color: var(--text-mid);
      font-style: italic;
      line-height: 1.85;
      margin-bottom: 3rem;
    }
    .bio-panel__lore p { margin-bottom: 1.4em; }
    .bio-panel__lore p:last-child { margin-bottom: 0; }

    /* Placeholder bio block */
    .bio-panel__placeholder {
      border: 1px dashed rgba(201,168,76,0.2);
      border-radius: 4px;
      padding: 4rem 3rem;
      text-align: center;
      margin-bottom: 3rem;
    }
    .bio-panel__placeholder-icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.4; }
    .bio-panel__placeholder-text {
      font-family: var(--font-mono); font-size: 1.1rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim); line-height: 1.8;
    }

    /* Trait detail in bio */
    .bio-panel__traits-detail { display: flex; flex-direction: column; gap: 1rem; }
    .bio-panel__trait-block {
      display: flex; align-items: center; gap: 1.5rem;
      padding: 1.4rem 1.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
    }
    .bio-panel__trait-block img {
      width: 36px; height: 36px; border-radius: 4px; object-fit: cover; flex-shrink: 0;
    }
    .bio-panel__trait-block-mark { font-size: 2.8rem; flex-shrink: 0; }
    .bio-panel__trait-block-info {}
    .bio-panel__trait-block-name {
      font-family: var(--font-display); font-size: 1.4rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-bright); margin-bottom: 0.3rem;
    }
    .bio-panel__trait-block-type {
      font-family: var(--font-mono); font-size: 1rem;
      letter-spacing: 0.12em; color: var(--text-dim);
    }

    @media (max-width: 700px) {
      .bio-panel { width: 100vw; }
      .bio-panel__portrait { height: 300px; }
      .all-units-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.4rem; }
    }
  </style>
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__brand">
        <span class="nav__brand-mark" aria-hidden="true"></span>

  <main class="units-page">
    <div class="container">

      <div style="margin-bottom:5rem;text-align:center">
        <span class="section-tag">Roster Map</span>
        <h1 class="section-title">All Units</h1>
        <p class="section-desc">Browse every unit in the Dominion roster and assign each one a custom title subtitle.</p>
      </div>

      <div class="filters-bar">
        <div class="filters-bar__group">
          <span class="filters-bar__label">Cost Tier</span>
          <div class="filters-bar__btns" id="costFilters">
            <button class="filter-btn active" data-cost="all">All</button>
            <button class="filter-btn" data-cost="1"><span class="cost-pip cost-1">1</span></button>
            <button class="filter-btn" data-cost="2"><span class="cost-pip cost-2">2</span></button>

            <button class="filter-btn" data-cost="5"><span class="cost-pip cost-5">5</span></button>

        </div>
        <div class="filters-bar__group">
          <span class="filters-bar__label">Role</span>
          <div class="filters-bar__btns" id="roleFilters">
            <button class="filter-btn active" data-role="all">All</button>
            <button class="filter-btn" data-role="tank">Tank</button>
            <button class="filter-btn" data-role="fighter">Fighter</button>
            <button class="filter-btn" data-role="caster">Caster</button>
            <button class="filter-btn" data-role="marksman">Marksman</button>
            <button class="filter-btn" data-role="hybrid">Hybrid</button>
          </div>
        </div>
        <div class="search-row">
          <input type="text" class="page-search" id="unitSearch" placeholder="Search units..." />
        </div>
      </div>

      <p class="units-count">Showing <span id="unitCount">0</span> units</p>
      <div class="all-units-grid" id="allUnitsGrid"></div>

    </div>
  </main>

  <!-- BIO PANEL BACKDROP -->
  <div class="bio-panel__backdrop" id="bioBackdrop"></div>

  <!-- BIO PANEL -->
  <aside class="bio-panel" id="bioPanel">
    <button class="bio-panel__close" id="bioPanelClose">Close</button>
    <div class="bio-panel__portrait" id="bioPanelPortrait">
      <div class="bio-panel__portrait-fallback" id="bioPanelFallback"></div>
      <img id="bioPanelImg" src="" alt="" onerror="this.style.display='none';document.getElementById('bioPanelFallback').style.display='flex'" />
      <div class="bio-panel__portrait-shade"></div>
      <div class="bio-panel__header">
        <div class="bio-panel__cost-row">
          <div class="bio-panel__cost-gems" id="bioCostGems"></div>
          <span class="bio-panel__role" id="bioPanelRole"></span>
        </div>
        <h2 class="bio-panel__name" id="bioPanelName"></h2>
        <div class="bio-panel__trait-row" id="bioPanelTraitRow"></div>
      </div>
    </div>
    <div class="bio-panel__body" id="bioPanelBody"></div>
  </aside>

  <script src="data.js"></script>
  <script src="site-data-patch.js"></script>
  <script src="universe.js"></script>
  <script>


    function getInitialMark(text, fallback = "CS") {
      const source = String(text || fallback).replace(/[^a-zA-Z0-9 ]/g, " ").trim();
      if (!source) return fallback;
      const parts = source.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return source.slice(0, 2).toUpperCase();
    }
    function traitMark(traitName) { return getInitialMark(traitName, "TR"); }
    function unitMark(unit) { return getInitialMark(unit && unit.name, "UN"); }

    function imageSafeName(value) {
      return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "");
    }

    const COST_COLORS_PAGE = { 1:"#888", 2:"#3a9940", 3:"#3a60c0", 4:"#8830c0", 5:"#c9a84c" };

    // X = horizontal focal point of unit art within the landscape source image
    // object-fit:cover on portrait card crops the landscape image horizontally
    // Y is always "top" since units are in upper portion of landscape images
    const UNIT_POSITIONS = {
      acolyte        : "top 62%",
      aetherion      : "top 55%",
      anchorfire     : "top 55%",

      satellitetitan : "top 57%",
      servoswing     : "top 58%",
      shardframe     : "top 59%",
      sharplink      : "top 57%",
      sightline      : "top 54%",
      sisteraegis    : "top 55%",
      skydrive       : "top 52%",
      slicenode      : "top 50%",
      socratech      : "top 57%",
      soulsync       : "top 55%",
      splitshine     : "top 56%",
      springlock     : "top 56%",
      starbreaker    : "top 57%",
      starstruck     : "top 56%",
      steelguard     : "top 62%",
      steelrunner    : "top 59%",
      steelshade     : "top 56%",
      stormcoil      : "top 61%",
      swiftframe     : "top 58%",
      thunk          : "top 55%",
      tracercore     : "top 57%",
      whirlguard     : "top 60%",
      widowframe     : "top 58%",
    };

    let activeCost = "all";
    let activeRole = "all";
    let activeSearch = "";

    function getRoleCat(role) {
      if (!role) return "hybrid";
      const r = role.toLowerCase();
      if (r.includes("tank")) return "tank";
      if (r.includes("marksman")) return "marksman";
      if (r.includes("fighter") || r.includes("assassin")) return "fighter";
      if (r.includes("caster") && !r.includes("attack")) return "caster";
      return "hybrid";
    }

    // Build trait icon HTML. If a custom image is missing, use a short text code.
    function traitIconHTML(traitName, size = 20) {
      const safeName = imageSafeName(traitName);
      const imgPath = `./images/traits/${safeName}Icon.png`;
      const mark = traitMark(traitName);
      return `
        <div class="ucf__trait-icon" title="${traitName}" style="width:${size}px;height:${size}px">
          <img src="${imgPath}" alt="${traitName}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
               style="width:100%;height:100%;object-fit:cover;display:block" />
          <span class="ucf__trait-icon-fallback" style="display:none">${mark}</span>
        </div>
      `;
    }

    function renderAllUnits() {
      const grid = document.getElementById("allUnitsGrid");
      const filtered = CS_DATA.units.filter(unit => {
        const costMatch = activeCost === "all" || String(unit.cost) === activeCost;
        const roleMatch = activeRole === "all" || getRoleCat(unit.role) === activeRole;
        const traitSearchText = (Array.isArray(unit.traits) ? unit.traits : []).join(" ").toLowerCase();
        const searchMatch = !activeSearch ||
          String(unit.name || "").toLowerCase().includes(activeSearch) ||
          traitSearchText.includes(activeSearch) ||
          String(unit.role || "").toLowerCase().includes(activeSearch);
        return costMatch && roleMatch && searchMatch;
      });

      if (activeCost === "all") {
        filtered.sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), undefined, { sensitivity: "base" }));
      }

      document.getElementById("unitCount").textContent = filtered.length;

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="ucf__no-results">No units found</div>`;
        return;
      }

      grid.innerHTML = filtered.map(unit => {
        const mark = unitMark(unit);
        const costColor = COST_COLORS_PAGE[unit.cost] || "#888";
        // Image: ./images/units/[Name]Card.png - no spaces, original casing
        const safeName = unit.imageName || imageSafeName(unit.name);
        const imgPath = `./images/units/${safeName}Card.png`;

        const subtitle = unit.subtitle || "Subtitle";
        
        return `
          <div class="ucf" onclick="openBioPanel('${unit.id}')">
            <div class="ucf__portrait" style="background:linear-gradient(160deg,${costColor}25,#06081099)">
              <img class="ucf__portrait-img"
                   src="${imgPath}"
                   alt="${unit.name}"
                   style="object-fit:contain;object-position:center center;padding:1.2rem 1.2rem 0.6rem"
                   onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
              <div class="ucf__portrait-fallback" style="display:none">${mark}</div>
              <div class="ucf__portrait-shade"></div>
            </div>
            <div class="ucf__info">
              <div class="ucf__name-row">
                <span class="ucf__name">${unit.name}</span>
              </div>
              <div class="ucf__subtitle">${subtitle}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    // -- BIO PANEL ---------------------------------------------
    function openBioPanel(unitId) {
      const unit = CS_DATA.units.find(u => String(u.id) === String(unitId));
      if (!unit) return;

      const costColor = COST_COLORS_PAGE[unit.cost] || "#888";
      const safeName = unit.imageName || imageSafeName(unit.name);
      const imgPath = `./images/units/${safeName}Card.png`;
      const mark = unitMark(unit);

      // Portrait
      const img = document.getElementById("bioPanelImg");
      const fallback = document.getElementById("bioPanelFallback");
      img.src = imgPath;
      img.alt = unit.name;
      img.style.display = "block";
      img.style.objectFit = "contain";
      img.style.objectPosition = "center center";
      img.style.padding = "1.8rem 1.8rem 0.8rem";
      fallback.textContent = unitMark(unit);
      fallback.style.display = "none";
      document.getElementById("bioPanelPortrait").style.background =
        `linear-gradient(160deg, ${costColor}30, #06081099)`;

      // Cost gems
      document.getElementById("bioCostGems").innerHTML =
        Array.from({length: unit.cost}, () =>
          `<div class="bio-panel__cost-gem" style="background:${costColor}"></div>`
        ).join("");

      // Role & name
      document.getElementById("bioPanelRole").textContent = unit.role;
      document.getElementById("bioPanelName").textContent = unit.name;

      // Trait row (icons + names)
      const bioTraitList = Array.isArray(unit.traits) ? unit.traits : [];
      document.getElementById("bioPanelTraitRow").innerHTML = bioTraitList.map(t => {
        const traitData = CS_DATA.traits.find(tr => tr.name === t);
        const traitCode = traitMark(t);
        const traitColor = traitData ? traitData.color : "#c9a84c";
        const tSafe = imageSafeName(t);
        return `
          <div class="bio-panel__trait-tag" style="border-color:${traitColor}30">
            <img src="./images/traits/${tSafe}Icon.png" alt="${t}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"
                 style="width:18px;height:18px;border-radius:2px;object-fit:cover" />
            <span class="bio-panel__trait-tag-mark" style="display:none">${traitCode}</span>
            <span class="bio-panel__trait-tag-name" style="color:${traitColor}">${t}</span>
          </div>
        `;
      }).join("");

      // Body: bio placeholder + trait detail
      const traitsDetailHTML = bioTraitList.map(t => {
        const traitData = CS_DATA.traits.find(tr => tr.name === t);
        const traitColor = traitData && traitData.color ? traitData.color : "#c9a84c";
        const traitType = traitData && traitData.type ? (traitData.type === "origin" ? "Origin" : "Class") : "Trait";
        const traitTagline = traitData && traitData.tagline ? traitData.tagline : "Supplemental archive entry";
        const tSafe = imageSafeName(t);
        return `
          <div class="bio-panel__trait-block" style="border-color:${traitColor}25">
            <img src="./images/traits/${tSafe}Icon.png" alt="${t}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
                 style="width:36px;height:36px;border-radius:4px;object-fit:cover;flex-shrink:0" />
            <span class="bio-panel__trait-block-mark" style="display:none">${traitMark(t)}</span>
            <div class="bio-panel__trait-block-info">
              <div class="bio-panel__trait-block-name" style="color:${traitColor}">${traitData ? traitData.name : t}</div>
              <div class="bio-panel__trait-block-type">${traitType} / ${traitTagline}</div>
            </div>
          </div>
        `;
      }).join("");

      const detailsEntries = unit.details ? Object.entries(unit.details) : [];
      const abilityEntries = unit.ability ? Object.entries(unit.ability) : [];
      document.getElementById("bioPanelBody").innerHTML = `
        <div class="bio-panel__section-label">Biography</div>
        <div class="bio-panel__placeholder">
          <div class="bio-panel__placeholder-icon">BIO</div>
          <div class="bio-panel__placeholder-text">
            ${unit.lore ? unit.lore : `No biography entry has been added for ${unit.name} yet.`}
          </div>
        </div>

        ${abilityEntries.length ? `<div class="bio-panel__section-label">Ability Notes</div><div class="bio-panel__traits-detail">${abilityEntries.map(([label, value]) => `<div class="bio-panel__trait-block"><div class="bio-panel__trait-block-info"><div class="bio-panel__trait-block-name">${label.charAt(0).toUpperCase() + label.slice(1)}</div><div class="bio-panel__trait-block-type">${value}</div></div></div>`).join("")}</div>` : ""}

        ${detailsEntries.length ? `<div class="bio-panel__section-label">Combat Data</div><div class="bio-panel__traits-detail">${detailsEntries.map(([label, value]) => `<div class="bio-panel__trait-block"><div class="bio-panel__trait-block-info"><div class="bio-panel__trait-block-name">${label.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase())}</div><div class="bio-panel__trait-block-type">${value}</div></div></div>`).join("")}</div>` : ""}

        <div class="bio-panel__section-label">Traits</div>
        <div class="bio-panel__traits-detail">
          ${traitsDetailHTML}
        </div>
      `;

      // Open panel
      document.getElementById("bioPanel").classList.add("open");
      document.getElementById("bioBackdrop").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeBioPanel() {
      document.getElementById("bioPanel").classList.remove("open");
      document.getElementById("bioBackdrop").classList.remove("open");
      document.body.style.overflow = "";
    }

    document.getElementById("bioPanelClose").addEventListener("click", closeBioPanel);
    document.getElementById("bioBackdrop").addEventListener("click", closeBioPanel);
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeBioPanel(); });

    // -- INIT --------------------------------------------------
    document.addEventListener("DOMContentLoaded", () => {
      renderAllUnits();

      document.querySelectorAll("#costFilters .filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#costFilters .filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeCost = btn.dataset.cost;
          renderAllUnits();
        });
      });

      document.querySelectorAll("#roleFilters .filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#roleFilters .filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeRole = btn.dataset.role;
          renderAllUnits();
        });
      });

      document.getElementById("unitSearch").addEventListener("input", e => {
        activeSearch = e.target.value.toLowerCase().trim();
        renderAllUnits();
      });

      // Nav scroll
      const nav = document.getElementById("nav");
      window.addEventListener("scroll", () => {
        nav.style.background = window.scrollY > 80
          ? "rgba(6,8,16,0.98)" : "rgba(6,8,16,0.92)";
      }, { passive: true });
    });

  </script>
</body>
</html>
